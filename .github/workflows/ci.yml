# Main CI: fires on push to main when SRE paths change. Builds and
# pushes the image to GHCR, bumps chart values image tag, commits
# the bump back so Argo CD picks up the change and syncs.
name: SRE CI

on:
  push:
    branches: [main, master]
    paths:
      - "sre/**"
      - "backend/**"
      - ".github/workflows/ci.yml"
    tags:
      - "v*.*.*"

concurrency:
  group: sre-ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write     # needed to commit values.yaml bump
  packages: write     # needed to push to ghcr.io
  id-token: write     # cosign keyless signing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: schlotech/tekmetric-backend

jobs:
  build-push:
    name: Build, scan, push, bump
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Compute image tag:
      #   - push to main  -> sha-<short>
      #   - tag push v*   -> <tag>-sha-<short>
      - name: Compute tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}-sha-${SHORT_SHA}"
          else
            TAG="sha-${SHORT_SHA}"
          fi
          echo "image_tag=${TAG}"        >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"  >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sre/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          format: sarif
          output: trivy.sarif
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      # GitOps step: bump image tag in values.yaml so Argo reconciles.
      # Uses [skip ci] in commit message to avoid retriggering this workflow.
      - name: Bump chart image tag
        env:
          NEW_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          FILE=sre/chart/values.yaml
          sed -i -E "s|^(  tag: ).*$|\1\"${NEW_TAG}\"|" "$FILE"
          sed -i -E "s|^appVersion: .*$|appVersion: \"${NEW_TAG}\"|" sre/chart/Chart.yaml
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE" sre/chart/Chart.yaml
          git commit -m "chore(sre): bump backend image to ${NEW_TAG} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
