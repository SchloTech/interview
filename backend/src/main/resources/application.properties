spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 console: enabled by default for local dev, disabled in prod via env var.
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

# Actuator: run management endpoints on a separate port so we can
# network-isolate them from public traffic via NetworkPolicy.
management.server.port=8081
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name:tekmetric-backend}

# Build info surfaced at /actuator/info when spring-boot-maven-plugin
# generates build-info.properties.
management.info.env.enabled=true
